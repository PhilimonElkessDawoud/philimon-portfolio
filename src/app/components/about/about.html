<section id="about" class="py-24 bg-[#1a1a1a] sectionFadeIn">
    <div class="max-w-7xl mx-auto px-5">

        <div class="text-center mb-12">
            <h2 class="text-white text-3xl font-bold mb-2 titleFadeIn">
                {{ 'about.sectionTitle' | translate }}
            </h2>
            <p class="text-[#888] text-lg subtitleFadeIn">
                {{ 'about.subtitle' | translate }}
            </p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 items-center">

            <div class="flex justify-center lg:justify-start slideInLeft">
                <div class="relative w-full max-w-[350px] h-[450px]
          rounded-[40%_60%_60%_40%/60%_40%_60%_40%]
          overflow-hidden bg-[#2d2d2d]
          imageContainerHover imageSlideIn imageFloat gradientOverlay">
                    <img src="/Philimon.png" alt="Profile" class="w-full h-full object-cover object-top grayscale" />
                </div>
            </div>

            <div class="text-[#888] text-sm leading-relaxed slideInRight contentFadeIn">
                <p class="mb-6 text-base whitespace-pre-line bioTextReveal">
                    {{ 'about.bio' | translate }}
                </p>
                <a [href]="cvUrl" download class="inline-flex items-center gap-2 bg-orange-500 text-white
            px-6 py-3 rounded-md font-medium buttonHover buttonSlideIn buttonPulse">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="7 10 12 15 17 10" />
                        <line x1="12" y1="15" x2="12" y2="3" />
                    </svg>
                    {{ 'about.downloadCv' | translate }}
                </a>
            </div>

        </div>

        <div #skillsSection class="mt-16 pt-10 border-t border-[#333]">
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-8 justify-items-center">
                @for (skill of skills; track skill.id) {
                <div class="flex flex-col items-center gap-3 skillCardHover" [class.skillCardSlideIn]="isVisible"
                    [style.animation-delay]="getStaggerDelay(skill.id)" [style.animation-fill-mode]="'both'">

                    <div class="w-24 h-24 relative progressRing">
                        <svg class="w-full h-full -rotate-90" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="45" fill="none" stroke="#333" stroke-width="8" />
                            <circle cx="50" cy="50" r="45" fill="none" stroke="#FF6B00" stroke-width="8"
                                stroke-linecap="round" [attr.stroke-dasharray]="circumference"
                                [attr.stroke-dashoffset]="getDashoffset(skill.id)" />
                        </svg>
                        <div class="absolute inset-0 flex items-center justify-center skillIconBounce">
                            <app-icon [name]="skill.iconKey" />
                        </div>
                    </div>

                    <span class="text-orange-500 font-bold text-lg percentageCounter">
                        {{ animatedValues[skill.id] }}%
                    </span>

                    <span class="text-[#888] text-sm textReveal">
                        {{ skill.name }}
                    </span>

                </div>
                }
            </div>
        </div>

    </div>
</section>
