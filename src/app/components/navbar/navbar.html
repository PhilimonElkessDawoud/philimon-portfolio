<nav class="fixed top-0 left-0 right-0 z-50 bg-[#0D0D0D] border-b border-[rgba(255,107,53,0.2)]">
    <div class="max-w-[1600px] mx-auto px-6 lg:px-8">
        <div class="flex items-center justify-between h-[70px]">

            <div>

                <a routerLink="/"
                    class="text-2xl font-bold tracking-wide bg-gradient-to-r from-orange-500 via-red-500 to-red-600 bg-clip-text text-transparent mr-12">
                    PE
                </a>
            </div>
            <div>
                <ul class="hidden md:flex items-center gap-10">
                    @for (link of navLinks; track link.id) {
                    <li>
                        <a [routerLink]="link.path" routerLinkActive="text-[#FF6B35]"
                            [routerLinkActiveOptions]="{ exact: true }"
                            class="text-sm font-medium transition-all duration-[300ms] ease-[cubic-bezier(0.4,0,0.2,1)] text-[#888888] hover:text-white">
                            {{ 'nav.' + link.key | translate }}
                        </a>
                    </li>
                    }
                </ul>
            </div>



            <div class="flex items-center justify-between h-[70px]">

                <div class="flex items-center gap-2 mr-10">
                    <span class="text-sm text-[#888888]">EN</span>
                    <button (click)="toggleLanguage()"
                        class="relative w-12 h-7 rounded-full transition-colors duration-300 focus:outline-none"
                        [class.bg-[#FF6B35]]="currentLang === 'fr'" [class.bg-[#333]]="currentLang === 'en'">
                        <span
                            class="absolute top-0.5 left-0.5 w-6 h-6 bg-white rounded-full shadow transition-transform duration-300"
                            [class.translate-x-5]="currentLang === 'fr'" [class.translate-x-0]="currentLang === 'en'">
                        </span>
                    </button>
                    <span class="text-sm text-[#888888]">FR</span>
                </div>

                <div class="hidden md:flex items-center gap-3">

                    <a routerLink="/contact"
                        class="inline-flex items-center justify-center w-[110px] py-2.5 bg-[#FF6B35] text-white text-sm font-medium rounded transition-all duration-[300ms] ease-[cubic-bezier(0.4,0,0.2,1)] hover:bg-[#ff8555] hover:scale-105">
                        {{ 'nav.hireMe' | translate }}
                    </a>

                </div>

                <button class="md:hidden text-white text-xl p-2" (click)="toggleMenu()" aria-label="Toggle menu">
                    <i [class]="isMenuOpen ? 'fas fa-times' : 'fas fa-bars'"></i>
                </button>

            </div>
        </div>

        @if (isMenuOpen) {
        <div class="md:hidden flex flex-col gap-4 py-6 border-t border-[rgba(255,107,53,0.2)]">

            @for (link of navLinks; track link.id) {
            <a [routerLink]="link.path" routerLinkActive="text-[#FF6B35]" [routerLinkActiveOptions]="{ exact: true }"
                class="text-sm font-medium transition-all duration-[300ms] text-[#888888] hover:text-white"
                (click)="closeMenu()">
                {{ 'nav.' + link.key | translate }}
            </a>
            }

            <a routerLink="/contact"
                class="inline-flex items-center justify-center px-6 py-2.5 bg-[#FF6B35] text-white text-sm font-medium rounded transition-all duration-[300ms] hover:bg-[#ff8555] mt-2"
                (click)="closeMenu()">
                {{ 'nav.hireMe' | translate }}
            </a>

        </div>
        }

    </div>
</nav>
