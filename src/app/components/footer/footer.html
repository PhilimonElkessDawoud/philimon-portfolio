<footer class="bg-[#0D0D0D] border-t border-[rgba(255,107,53,0.2)]">
    <div class="max-w-[1400px] mx-auto px-6 lg:px-8 py-12">
        <div class="flex flex-col items-center text-center">

            <a routerLink="/"
                class="text-2xl font-bold bg-gradient-to-r from-orange-500 via-red-500 to-red-600 bg-clip-text text-transparent tracking-wide mb-8">
                Philimon Ekladyous
            </a>

            <div class="flex items-center gap-4 mb-8">
                @for (social of socialLinks; track social.icon) {
                <a [href]="social.label === 'CV' ? cvUrl : social.url" [attr.download]="social.download ? '' : null"
                    target="_blank" rel="noopener noreferrer" [attr.aria-label]="social.label"
                    class="w-10 h-10 flex items-center justify-center border border-[rgba(255,107,53,0.3)] rounded-full text-[#888888] transition-all duration-300 hover:border-[#FF6B35] hover:text-[#FF6B35]">
                    <i [class]="social.icon"></i>
                </a>
                }
            </div>

            <div class="flex flex-wrap items-center justify-center gap-8 mb-8 text-sm text-[#888888]">
                <a href="mailto:philimonelkessdaoud@gmail.com"
                    class="flex items-center gap-2 hover:text-white transition-colors duration-300">
                    <i class="far fa-envelope"></i>
                    philimonelkessdaoud@gmail.com
                </a>
                <a href="tel:+33745906549"
                    class="flex items-center gap-2 hover:text-white transition-colors duration-300">
                    <i class="fas fa-phone-alt"></i>
                    +33745906549
                </a>
            </div>

            <div class="border-t border-[rgba(255,107,53,0.2)] w-full max-w-xl pt-6">
                <p class="text-xs text-[#888888]">
                    {{ 'footer.designedBy' | translate }}
                    <span class="font-semibold text-white">Philimon Ekladyous</span>
                    {{ 'footer.role' | translate }}
                </p>
            </div>

        </div>
    </div>
</footer>
